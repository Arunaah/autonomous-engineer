version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ae-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - ae-network

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ae-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - ae-network

  postgres:
    image: postgres:16-alpine
    container_name: ae-postgres
    environment:
      POSTGRES_DB: autonomous_engineer
      POSTGRES_USER: ae_user
      POSTGRES_PASSWORD: ae_secure_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - ae-network

  # Phase 2 — Qdrant semantic memory
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ae-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - ae-network

  autonomous-engineer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ae-engine
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LITELLM_BASE_URL=http://litellm:4000
      - DATABASE_URL=postgresql://ae_user:ae_secure_pass_2024@postgres:5432/autonomous_engineer
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - postgres
      - litellm
      - ollama
      - qdrant
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - ae-network

volumes:
  ollama_data:
  postgres_data:
  qdrant_data:

networks:
  ae-network:
    driver: bridge
