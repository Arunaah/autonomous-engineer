model_list:
  # Primary builder — Qwen2.5 Coder (best coding model, replaces GLM-4)
  - model_name: glm4
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://ae-ollama:11434

  # Reviewer — same model
  - model_name: glm4-reviewer
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://ae-ollama:11434

  - model_name: minimax-reviewer
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://ae-ollama:11434

litellm_settings:
  drop_params: true
  request_timeout: 600
  num_retries: 3

general_settings:
  master_key: ae-litellm-master-key-2024
