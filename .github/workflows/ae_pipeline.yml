name: Autonomous Engineer — Full Validation Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CONFIDENCE_THRESHOLD: 95
  MAX_ITERATIONS: 9

jobs:
  # ═══════════════════════════════════════════════════════
  # STAGE 1 — Static Analysis + Security
  # ═══════════════════════════════════════════════════════
  static_and_security:
    name: "Stage 1 — Static + Security"
    runs-on: ubuntu-latest
    outputs:
      score: ${{ steps.score.outputs.score }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff (linting + formatting)
        id: ruff
        run: ruff check . --output-format=github

      - name: MyPy (type checking)
        id: mypy
        run: mypy agent memory retrieval --ignore-missing-imports

      - name: Semgrep (security scan)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/secrets
            p/owasp-top-ten

      - name: pip-audit (dependency vulnerabilities)
        run: pip install pip-audit && pip-audit

      - name: Trivy (container scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Compute static score
        id: score
        run: echo "score=25" >> $GITHUB_OUTPUT

  # ═══════════════════════════════════════════════════════
  # STAGE 2 — Testing + Coverage
  # ═══════════════════════════════════════════════════════
  testing:
    name: "Stage 2 — Tests + Coverage"
    runs-on: ubuntu-latest
    needs: static_and_security
    outputs:
      score: ${{ steps.score.outputs.score }}
      coverage: ${{ steps.coverage.outputs.coverage }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: autonomous_engineer_test
          POSTGRES_USER: ae_user
          POSTGRES_PASSWORD: ae_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        id: pytest
        env:
          DATABASE_URL: postgresql://ae_user:ae_password@localhost:5432/autonomous_engineer_test
        run: |
          pytest tests/ \
            --cov=agent --cov=memory --cov=retrieval \
            --cov-report=xml --cov-report=term \
            --cov-fail-under=90 \
            -v --tb=short

      - name: Extract coverage
        id: coverage
        run: |
          COVERAGE=$(python -c "import xml.etree.ElementTree as ET; t=ET.parse('coverage.xml').getroot(); print(round(float(t.get('line-rate'))*100,1))")
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Compute testing score
        id: score
        run: |
          COVERAGE=${{ steps.coverage.outputs.coverage }}
          if (( $(echo "$COVERAGE >= 90" | bc -l) )); then
            echo "score=25" >> $GITHUB_OUTPUT
          else
            echo "score=$(echo "$COVERAGE * 0.25" | bc)" >> $GITHUB_OUTPUT
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  # ═══════════════════════════════════════════════════════
  # STAGE 3 — Production Simulation
  # ═══════════════════════════════════════════════════════
  production_simulation:
    name: "Stage 3 — Production Simulation"
    runs-on: ubuntu-latest
    needs: testing
    outputs:
      score: ${{ steps.score.outputs.score }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ae-test:${{ github.sha }} . \
            --cache-from type=gha \
            --cache-to type=gha,mode=max

      - name: Run database migrations
        run: |
          docker run --rm \
            --network host \
            -e DATABASE_URL=postgresql://ae_user:ae_password@localhost:5432/autonomous_engineer \
            ae-test:${{ github.sha }} \
            python -m alembic upgrade head

      - name: Testcontainers E2E tests
        run: |
          pip install -e ".[dev]"
          pytest tests/e2e/ -v --tb=short -m "e2e"
        env:
          USE_TESTCONTAINERS: "true"

      - name: Compute production simulation score
        id: score
        run: echo "score=20" >> $GITHUB_OUTPUT

  # ═══════════════════════════════════════════════════════
  # STAGE 4 — Stress Testing
  # ═══════════════════════════════════════════════════════
  stress_testing:
    name: "Stage 4 — Stress + Fuzz"
    runs-on: ubuntu-latest
    needs: production_simulation
    outputs:
      score: ${{ steps.score.outputs.score }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Hypothesis property-based tests
        run: pytest tests/property/ -v --hypothesis-seed=42

      - name: k6 load test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/load/k6_script.js
          flags: --vus 10 --duration 30s

      - name: Playwright fuzz (if applicable)
        run: |
          if [ -d "tests/fuzz" ]; then
            pip install playwright && playwright install chromium
            pytest tests/fuzz/ -v
          else
            echo "No fuzz tests found, skipping"
          fi

      - name: Compute stress score
        id: score
        run: echo "score=15" >> $GITHUB_OUTPUT

  # ═══════════════════════════════════════════════════════
  # CONFIDENCE ENGINE — Deterministic Scoring
  # ═══════════════════════════════════════════════════════
  confidence_engine:
    name: "Confidence Engine"
    runs-on: ubuntu-latest
    needs:
      - static_and_security
      - testing
      - production_simulation
      - stress_testing

    steps:
      - uses: actions/checkout@v4

      - name: Compute final confidence score
        id: confidence
        run: |
          STATIC=${{ needs.static_and_security.outputs.score }}
          TESTING=${{ needs.testing.outputs.score }}
          SIMULATION=${{ needs.production_simulation.outputs.score }}
          STRESS=${{ needs.stress_testing.outputs.score }}
          REVIEWER=12  # Will be updated by reviewer module

          TOTAL=$((STATIC + TESTING + SIMULATION + STRESS + REVIEWER))
          echo "confidence=$TOTAL" >> $GITHUB_OUTPUT
          echo "## Confidence Score: $TOTAL/100" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Score |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Static + Security | $STATIC/25 |" >> $GITHUB_STEP_SUMMARY
          echo "| Testing + Coverage | $TESTING/25 |" >> $GITHUB_STEP_SUMMARY
          echo "| Production Simulation | $SIMULATION/20 |" >> $GITHUB_STEP_SUMMARY
          echo "| Stress Testing | $STRESS/15 |" >> $GITHUB_STEP_SUMMARY
          echo "| Reviewer | $REVIEWER/15 |" >> $GITHUB_STEP_SUMMARY

      - name: Auto-merge if confidence ≥ 95
        if: ${{ steps.confidence.outputs.confidence >= 95 }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --auto \
            --subject "Auto-merge: confidence ${{ steps.confidence.outputs.confidence }}/100"

      - name: Post failure summary for fix loop
        if: ${{ steps.confidence.outputs.confidence < 95 }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "
          ## 🔄 Fix Loop Triggered
          **Confidence:** ${{ steps.confidence.outputs.confidence }}/100 (threshold: 95)

          ### Failed Stages
          CI has posted structured failure reports above.
          The autonomous agent will analyze and push a fix.

          **Max iterations remaining:** ${{ env.MAX_ITERATIONS }}
          "
